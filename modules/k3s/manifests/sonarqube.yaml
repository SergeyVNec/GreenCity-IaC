# SonarQube Community (CCI server) + dedicated PostgreSQL, on the observability node.
# UI via NodePort 30900. DB is isolated from the GreenCity RDS.
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: sonar-db, namespace: observability }
spec:
  replicas: 1
  selector: { matchLabels: { app: sonar-db } }
  strategy: { type: Recreate }
  template:
    metadata: { labels: { app: sonar-db } }
    spec:
      nodeSelector: { role: splunk }
      tolerations:
        - { key: dedicated, operator: Equal, value: splunk, effect: NoSchedule }
      containers:
        - name: postgres
          image: postgres:15
          env:
            - { name: POSTGRES_USER, value: "sonar" }
            - { name: POSTGRES_PASSWORD, valueFrom: { secretKeyRef: { name: sonar-db-secret, key: password } } }
            - { name: POSTGRES_DB, value: "sonarqube" }
            - { name: PGDATA, value: "/var/lib/postgresql/data/pgdata" }
          ports:
            - { containerPort: 5432 }
          resources:
            requests: { memory: "256Mi", cpu: "100m" }
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
      volumes:
        - { name: data, emptyDir: {} }
---
apiVersion: v1
kind: Service
metadata: { name: sonar-db, namespace: observability }
spec:
  selector: { app: sonar-db }
  ports:
    - { port: 5432, targetPort: 5432 }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: sonarqube, namespace: observability }
spec:
  replicas: 1
  selector: { matchLabels: { app: sonarqube } }
  strategy: { type: Recreate }
  template:
    metadata: { labels: { app: sonarqube } }
    spec:
      nodeSelector: { role: splunk }
      tolerations:
        - { key: dedicated, operator: Equal, value: splunk, effect: NoSchedule }
      # SonarQube's embedded Elasticsearch requires vm.max_map_count >= 524288.
      initContainers:
        - name: sysctl
          image: busybox:1.36
          command: ["sh", "-c", "sysctl -w vm.max_map_count=524288 && sysctl -w fs.file-max=131072"]
          securityContext: { privileged: true }
      containers:
        - name: sonarqube
          image: sonarqube:community
          env:
            - { name: SONAR_JDBC_URL, value: "jdbc:postgresql://sonar-db.observability.svc.cluster.local:5432/sonarqube" }
            - { name: SONAR_JDBC_USERNAME, value: "sonar" }
            - { name: SONAR_JDBC_PASSWORD, valueFrom: { secretKeyRef: { name: sonar-db-secret, key: password } } }
          ports:
            - { containerPort: 9000 }
          resources:
            requests: { memory: "2Gi", cpu: "500m" }
          readinessProbe:
            httpGet: { path: /api/system/status, port: 9000 }
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 40
          volumeMounts:
            - { name: data, mountPath: /opt/sonarqube/data }
            - { name: extensions, mountPath: /opt/sonarqube/extensions }
      volumes:
        - { name: data, emptyDir: {} }
        - { name: extensions, emptyDir: {} }
---
apiVersion: v1
kind: Service
metadata: { name: sonarqube, namespace: observability }
spec:
  selector: { app: sonarqube }
  ports:
    - { name: web, port: 9000, targetPort: 9000 }
---
apiVersion: v1
kind: Service
metadata: { name: sonarqube-web, namespace: observability }
spec:
  type: NodePort
  selector: { app: sonarqube }
  ports:
    - { name: web, port: 9000, targetPort: 9000, nodePort: 30900 }
