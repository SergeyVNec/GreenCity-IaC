# Horizontal Pod Autoscaling for the Java backends (scalability).
# metrics-server ships with k3s. HPA scales on CPU relative to the pod's cpu request.
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: backcore, namespace: greencity }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: backcore }
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 120
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: backuser, namespace: greencity }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: backuser }
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 120
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: frontend, namespace: greencity }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: frontend }
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 120
