# Splunk Enterprise (free mode) on k3s. Web UI via NodePort 30800, HEC on 8088.
# HEC token is preconfigured so the OTel Collector can push data to it.
apiVersion: apps/v1
kind: Deployment
metadata: { name: splunk, namespace: observability }
spec:
  replicas: 1
  selector: { matchLabels: { app: splunk } }
  strategy: { type: Recreate }
  template:
    metadata: { labels: { app: splunk } }
    spec:
      # Pin to the dedicated t3.medium node and tolerate its taint.
      nodeSelector: { role: splunk }
      tolerations:
        - { key: dedicated, operator: Equal, value: splunk, effect: NoSchedule }
      containers:
        - name: splunk
          image: splunk/splunk:latest
          env:
            - { name: SPLUNK_GENERAL_TERMS, value: "--accept-sgt-current-at-splunk-com" }
            - { name: SPLUNK_START_ARGS, value: "--accept-license" }
            - { name: SPLUNK_PASSWORD, valueFrom: { secretKeyRef: { name: splunk-secret, key: password } } }
            - { name: SPLUNK_HEC_TOKEN, valueFrom: { secretKeyRef: { name: splunk-secret, key: hec-token } } }
          ports:
            - { containerPort: 8000 } # web UI
            - { containerPort: 8088 } # HEC
          resources:
            requests: { memory: "2Gi", cpu: "500m" }
          readinessProbe:
            httpGet: { path: /, port: 8000 }
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 30
---
apiVersion: v1
kind: Service
metadata: { name: splunk, namespace: observability }
spec:
  selector: { app: splunk }
  ports:
    - { name: web, port: 8000, targetPort: 8000 }
    - { name: hec, port: 8088, targetPort: 8088 }
---
apiVersion: v1
kind: Service
metadata: { name: splunk-web, namespace: observability }
spec:
  type: NodePort
  selector: { app: splunk }
  ports:
    - { name: web, port: 8000, targetPort: 8000, nodePort: 30800 }
